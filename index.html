<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WKR Konfigurator</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

.container {
    max-width: 1400px;
    margin: 40px auto;
    background: white;
    padding: 40px;
    border-radius: 12px;
}

.logo {
    text-align: center;
    margin-bottom: 20px;
}
.logo img { max-width: 500px; }

h2 { text-align:center; }

.section-title {
    font-weight: bold;
    font-size: 18px;
    margin-top: 30px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 25px;
}

.reihe-card {
    padding: 30px;
    text-align: center;
    border: 2px solid #ddd;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
}

.reihe-card:hover {
    border-color: #1c69d4;
}

.card {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: contain;
}

.card-title {
    padding: 15px;
    text-align: center;
}

/* 🔥 FIX SUMMARY */
.summary-box {
    display: flex;
    justify-content: space-between;
    align-items: center; /* wichtig */
    background: #f3f3f3;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

/* 🔥 FIX BILD */
.summary-img {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.summary-img img {
    max-width: 140px;
    height: auto;
    border-radius: 8px;
}

/* PREVIEW */
.preview img {
    width: 550px;
}

/* PRODUKT */
.product {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #ddd;
    padding: 20px 0;
}

.product-left {
    display: flex;
    gap: 20px;
}

.product-left img {
    width: 220px;
    cursor: pointer;
    transition: 0.3s;
}

.product-left img:hover {
    transform: scale(1.1);
}

.old-price {
    text-decoration: line-through;
    color: #888;
}

.new-price {
    font-size: 18px;
    font-weight: bold;
}

.green { color: green; }
.red { color: red; }

.hinweis {
    font-size: 12px;
    margin-top: 10px;
}

.button {
    background: #1c69d4;
    color: white;
    padding: 10px;
    border: none;
    cursor: pointer;
    margin-top: 10px;
}

.form-box {
    margin-top: 40px;
    padding: 20px;
    background: #f3f3f3;
    border-radius: 10px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="https://raw.githubusercontent.com/michelcarricamarta-ui/emmenegger-wkr/main/BMW_MINI_Emmenegger_rechtsbuendig_claim_rgb_pos.png">
<h2>Winterkompletträder Konfigurator</h2>
</div>

<div id="app"></div>

</div>

<script>

const urlProdukte = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Produkte";
const urlMapping = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Zuordnung";
const urlFahrzeuge = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Fahrzeuge";

let produkte=[], mapping=[], fahrzeuge=[];
let state = { reihe:null, modell:null, motor:null, produkt:null, produktPreview:null };

function clean(v){ return (v||"").toString().trim(); }

Promise.all([
fetch(urlProdukte).then(r=>r.json()),
fetch(urlMapping).then(r=>r.json()),
fetch(urlFahrzeuge).then(r=>r.json())
]).then(([p,m,f])=>{
produkte=p;
mapping=m;
fahrzeuge=f;
render();
});

function render(){

let html="";

/* SUMMARY */
if(state.motor){
let fahrzeug = fahrzeuge.find(f =>
clean(f["Reihe"])===state.reihe &&
clean(f["Modell"])===state.modell
);

html+=`
<div class="summary-box">

<div>
<b>Ihre Auswahl:</b><br>
${state.reihe} / ${state.modell} / ${state.motor}

<br><br>

<button class="button" onclick="resetSelection()">
Zurück zur Auswahl
</button>

</div>

<div class="summary-img">
<img src="${clean(fahrzeug?.Bild) || ''}">
</div>

</div>`;
}

/* PREVIEW */
if(state.produktPreview){
html+=`<div class="preview"><img src="${state.produktPreview["Bild"]}"></div>`;
}

/* REIHE */
if(!state.reihe){
let reihen=[...new Set(mapping.map(x=>clean(x["Reihe"])))];
html+=`<div class="section-title">1. Reihe wählen</div><div class="grid">`;
reihen.forEach(r=>{
html+=`<div class="reihe-card" onclick="selectReihe('${r}')">${r}</div>`;
});
html+=`</div>`;
}

/* MODELL */
if(state.reihe && !state.modell){
let modelle=[...new Set(mapping.filter(x=>clean(x["Reihe"])===state.reihe).map(x=>clean(x["Modell"])))];
html+=`<div class="section-title">2. Modell wählen</div><div class="grid">`;
modelle.forEach(m=>{
let fahrzeug = fahrzeuge.find(f =>
clean(f["Reihe"])===state.reihe &&
clean(f["Modell"])===m
);
html+=`
<div class="card" onclick="selectModell('${m}')">
<img src="${clean(fahrzeug?.Bild) || ''}">
<div class="card-title">${m}</div>
</div>`;
});
html+=`</div>`;
}

/* MOTOR */
if(state.modell && !state.motor){
let motors=[...new Set(mapping.filter(x=>
clean(x["Reihe"])===state.reihe &&
clean(x["Modell"])===state.modell
).map(x=>clean(x["Motor"])))];
html+=`<div class="section-title">3. Motor wählen</div><div class="grid">`;
motors.forEach(m=>{
html+=`<div class="reihe-card" onclick="selectMotor('${m}')">${m}</div>`;
});
html+=`</div>`;
}

/* PRODUKTE */
if(state.motor){

let tnList=mapping.filter(x=>
clean(x["Reihe"])===state.reihe &&
clean(x["Modell"])===state.modell &&
clean(x["Motor"])===state.motor
).map(x=>clean(x["TN"]));

let results=produkte.filter(p=>tnList.includes(clean(p["TN"])));

results.forEach(r=>{

let lager = parseInt(r["Lager"]) || 0;
let status = lager > 0 ? "green" : "red";
let text = lager > 0 ? "Verfügbar" : "Auf Bestellung";

let vp = parseFloat(r["VP"]) || 0;
let angebot = parseFloat(r["Angebotspreis"]) || 0;

let preisHTML = angebot > 0 
? `<div class="old-price">VP: ${vp} CHF</div><div class="new-price">Angebotspreis: ${angebot} CHF</div>`
: `<div class="new-price">${vp} CHF</div>`;

html+=`
<div class="product">

<div class="product-left">
<img src="${clean(r["Bild"])}" onclick='showPreview(${JSON.stringify(r)})'>
<div>
<b>${r["Bezeichnung"]}</b><br>
${r["Reifen"]}<br>
${r["Dimension"]}

<div class="hinweis">
${r["Hinweistext"] || ""}
<br><br>
Teilenummer: ${r["TN"]}
</div>
</div>
</div>

<div>
${preisHTML}

<div style="font-size:11px;">Preise inkl. MwST</div>

<div class="${status}" style="margin-top:10px;">${text}</div>

${lager===0 ? `<div style="font-size:12px;">Lieferzeit ca. 5–10 Arbeitstage</div>` : ""}

<button class="button" onclick='selectProdukt(${JSON.stringify(r)})'>Auswählen</button>
</div>

</div>`;
});
}

/* FORMULAR */
if(state.produkt){
html+=`
<div class="form-box">

<h3>Ihre Anfrage</h3>

<b>${state.produkt["Bezeichnung"]}</b><br><br>

<input id="name" placeholder="Name *">
<input id="email" placeholder="E-Mail *">
<input id="kennzeichen" placeholder="Kontrollschild * (z.B. AG 123456)">
<textarea id="bemerkung" placeholder="Bemerkung"></textarea>

<br>

<button class="button" onclick="sendAnfrage()">Anfrage senden</button>
<button class="button" onclick="sendBestellung()" style="background:#2e7d32;">Bestellung senden</button>
<button class="button" onclick="printAngebot()" style="background:#444;">Angebot drucken</button>

</div>`;
}
function validateForm(){

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();
let kennzeichen = document.getElementById("kennzeichen").value.trim();

if(!name){
    alert("Bitte Name eingeben");
    return false;
}

if(!email){
    alert("Bitte E-Mail eingeben");
    return false;
}

if(!kennzeichen){
    alert("Bitte Kontrollschild eingeben");
    return false;
}

return true;
}

function sendAnfrage(){

if(!validateForm()) return;

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let kennzeichen = document.getElementById("kennzeichen").value;
let bemerkung = document.getElementById("bemerkung").value;

let text = `
ANFRAGE

Name: ${name}
Email: ${email}
Kontrollschild: ${kennzeichen}

Produkt: ${state.produkt["Bezeichnung"]}
Preis: ${state.produkt["Angebotspreis"]} CHF

Bemerkung:
${bemerkung}
`;

window.location.href = "mailto:tv-g-fp@emmeneggerag.ch?subject=WKR Anfrage&body=" + encodeURIComponent(text);
}    

function sendBestellung(){

if(!validateForm()) return;

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let kennzeichen = document.getElementById("kennzeichen").value;

let text = `
BESTELLUNG

Name: ${name}
Email: ${email}
Kontrollschild: ${kennzeichen}

Produkt: ${state.produkt["Bezeichnung"]}
Preis: ${state.produkt["Angebotspreis"]} CHF
`;

window.location.href = "mailto:tv-g-fp@emmeneggerag.ch?subject=WKR Bestellung&body=" + encodeURIComponent(text);
}

function printAngebot(){

let content = `
<h2>BMW Winterkompletträder Angebot</h2>

<b>${state.produkt["Bezeichnung"]}</b><br>
${state.produkt["Dimension"]}<br><br>

Preis: ${state.produkt["Angebotspreis"]} CHF<br>
Preise inkl. MwST<br><br>

Teilenummer: ${state.produkt["TN"]}
`;

let win = window.open("", "", "width=800,height=600");
win.document.write(content);
win.document.close();
win.print();
}    
    
    
document.getElementById("app").innerHTML=html;
}

function selectReihe(r){ state.reihe=r; render(); }
function selectModell(m){ state.modell=m; render(); }
function selectMotor(m){ state.motor=m; render(); }

function showPreview(p){ 
    if(state.produktPreview && state.produktPreview.TN === p.TN){
        state.produktPreview = null;
    } else {
        state.produktPreview = p;
    }
    render();
}

function selectProdukt(p){ state.produkt=p; render(); }

function resetSelection(){
state = { reihe:null, modell:null, motor:null, produkt:null, produktPreview:null };
render();
}

</script>

</body>
</html>
