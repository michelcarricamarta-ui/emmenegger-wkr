<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WKR Konfigurator</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
}

.container {
    max-width: 1100px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
}

/* HEADER */
.logo {
    text-align: center;
    margin-bottom: 30px;
}
.logo img { max-width: 500px; }

h2 { text-align:center; }

/* TITEL */
.step-title {
    margin-top: 30px;
    font-weight: bold;
}

/* GRID */
.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    margin-top: 10px;
}

/* AUSWAHL */
.card {
    border: 1px solid #ccc;
    padding: 12px;
    cursor: pointer;
    border-radius: 8px;
    background: white;
    text-align: center;
    min-width: 160px;
}

.card:hover {
    border-color: #1c69d4;
}

.card img {
    max-width: 130px;
}

/* SUMMARY */
.summary {
    background: #f0f0f0;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 25px;
}

/* PRODUKTE */
.product {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #ddd;
    padding: 25px 0;
    max-width: 800px;
    margin: 0 auto;
}

.product-left {
    display: flex;
    gap: 20px;
}

.product-left img {
    width: 180px;
    border-radius: 8px;
}

.old-price {
    text-decoration: line-through;
    color: #888;
}

.new-price {
    font-size: 22px;
    font-weight: bold;
}

.green { color: green; }
.orange { color: orange; }
.red { color: red; }

.button {
    background: #555;
    color: white;
    padding: 10px;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="https://raw.githubusercontent.com/michelcarricamarta-ui/emmenegger-wkr/main/BMW_MINI_Emmenegger_rechtsbuendig_claim_rgb_pos.png">
<h2>Winterkompletträder Konfigurator</h2>
</div>

<div id="app"></div>

</div>

<script>

const urlProdukte = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Produkte";
const urlMapping = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Zuordnung";
const urlFahrzeuge = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Fahrzeuge";

let produkte=[], mapping=[], fahrzeuge=[];

let state = {
    reihe:null,
    modell:null,
    motor:null
};

function clean(v){ return (v||"").toString().trim(); }

Promise.all([
fetch(urlProdukte).then(r=>r.json()),
fetch(urlMapping).then(r=>r.json()),
fetch(urlFahrzeuge).then(r=>r.json())
]).then(([p,m,f])=>{
produkte=p;
mapping=m;
fahrzeuge=f;
render();
});

/* RENDER */
function render(){

let html="";

/* 👉 WENN MOTOR GEWÄHLT → NUR SUMMARY + PRODUKTE */
if(state.motor){

html += `
<div class="summary">
<b>Deine Auswahl:</b><br>
${state.reihe} → ${state.modell} → ${state.motor}
</div>
`;

let tnList=mapping.filter(x=>
clean(x["Reihe"])===state.reihe &&
clean(x["Modell"])===state.modell &&
clean(x["Motor"])===state.motor
).map(x=>clean(x["TN"]));

let results=produkte.filter(p=>tnList.includes(clean(p["TN"])));

results.forEach(r=>{

let lager=parseInt(r["Lager"])||0;
let status=lager>3?"green":lager>0?"orange":"red";
let text=lager>3?"Sofort verfügbar":lager>0?"Wenig Lager":"Nicht verfügbar";

html+=`
<div class="product">

<div class="product-left">
<img src="${r["Bild"]}">
<div>
<b>${r["Bezeichnung"]}</b><br>
${r["Reifen"]}<br>
${r["Dimension"]}
</div>
</div>

<div>
${r["VP"] ? `<div class="old-price">${r["VP"]} CHF</div>` : ""}
<div class="new-price">${r["Angebotspreis"]} CHF</div>
<div class="${status}">${text}</div>
<button class="button">Auswählen</button>
</div>

</div>`;
});

document.getElementById("app").innerHTML=html;
return;
}


/* 👉 NORMALER FLOW */

/* REIHE */
let reihen=[...new Set(mapping.map(x=>clean(x["Reihe"])))];

html+=`<div class="step-title">1. Reihe wählen</div><div class="grid">`;

reihen.forEach(r=>{
html+=`<div class="card" onclick="selectReihe('${r}')">${r}</div>`;
});

html+=`</div>`;


/* MODELL */
if(state.reihe){

let modelle=[...new Set(mapping
.filter(x=>clean(x["Reihe"])===state.reihe)
.map(x=>clean(x["Modell"]))
)];

html+=`<div class="step-title">2. Modell wählen</div><div class="grid">`;

modelle.forEach(m=>{

let fahrzeug = fahrzeuge.find(f =>
clean(f["Reihe"])===state.reihe &&
clean(f["Modell"])===m
);

html+=`
<div class="card" onclick="selectModell('${m}')">
<img src="${fahrzeug?.Bild || ''}">
<div>${m}</div>
</div>`;
});

html+=`</div>`;
}


/* MOTOR */
if(state.modell){

let motors=[...new Set(mapping
.filter(x=>
clean(x["Reihe"])===state.reihe &&
clean(x["Modell"])===state.modell
)
.map(x=>clean(x["Motor"]))
)];

html+=`<div class="step-title">3. Motor wählen</div><div class="grid">`;

motors.forEach(m=>{
html+=`<div class="card" onclick="selectMotor('${m}')">${m}</div>`;
});

html+=`</div>`;
}

document.getElementById("app").innerHTML=html;
}


/* ACTIONS */
function selectReihe(r){
state.reihe=r;
state.modell=null;
state.motor=null;
render();
}

function selectModell(m){
state.modell=m;
state.motor=null;
render();
}

function selectMotor(m){
state.motor=m;
render();
}

</script>

</body>
</html>
