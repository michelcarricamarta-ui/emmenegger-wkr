<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WKR Konfigurator</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
}

.container {
    max-width: 1200px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
}

/* HEADER */
.logo {
    text-align: center;
    margin-bottom: 30px;
}
.logo img { max-width: 500px; }

/* STEP TITLES */
.step-title {
    margin-top: 30px;
    font-weight: bold;
}

/* CARD GRID */
.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    margin-top: 10px;
}

/* CARD */
.card {
    border: 1px solid #ccc;
    padding: 10px;
    cursor: pointer;
    border-radius: 8px;
    background: white;
    min-width: 140px;
    text-align: center;
}

.card:hover {
    border-color: #1c69d4;
}

/* PRODUCT */
.product {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #ddd;
    padding: 20px 0;
}

.product-left {
    display: flex;
    gap: 20px;
}

.product-left img {
    width: 200px;
}

.old-price {
    text-decoration: line-through;
    color: #888;
}

.new-price {
    font-size: 22px;
    font-weight: bold;
}

.green { color: green; }
.orange { color: orange; }
.red { color: red; }

.button {
    background: #555;
    color: white;
    padding: 10px;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="https://raw.githubusercontent.com/michelcarricamarta-ui/emmenegger-wkr/main/BMW_MINI_Emmenegger_rechtsbuendig_claim_rgb_pos.png">
<h2>Winterkompletträder Konfigurator</h2>
</div>

<div id="app"></div>

</div>

<script>

const urlProdukte = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Produkte";
const urlMapping = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Zuordnung";
const urlFahrzeuge = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Fahrzeuge";

let produkte=[], mapping=[], fahrzeuge=[];

let state = {
    reihe: null,
    modell: null,
    generation: null,
    motor: null
};

function clean(v){ return (v||"").toString().trim(); }

Promise.all([
fetch(urlProdukte).then(r=>r.json()),
fetch(urlMapping).then(r=>r.json()),
fetch(urlFahrzeuge).then(r=>r.json())
]).then(([p,m,f])=>{
produkte=p; mapping=m; fahrzeuge=f;
render();
});

function render(){

let html = "";

/* REIHE */
let reihen=[...new Set(mapping.map(x=>clean(x["Reihe"])))];

html += `<div class="step-title">1. Reihe wählen</div><div class="grid">`;
reihen.forEach(r=>{
html += `<div class="card" onclick="selectReihe('${r}')">${r}</div>`;
});
html += `</div>`;

/* MODELL */
if(state.reihe){
let modelle=[...new Set(mapping.filter(x=>clean(x["Reihe"])===state.reihe).map(x=>clean(x["Modell"])))];

html += `<div class="step-title">2. Modell wählen</div><div class="grid">`;
modelle.forEach(m=>{
html += `<div class="card" onclick="selectModell('${m}')">${m}</div>`;
});
html += `</div>`;
}

/* GENERATION */
if(state.modell){
let gens=[...new Set(mapping.filter(x=>
clean(x["Reihe"])===state.reihe &&
clean(x["Modell"])===state.modell
).map(x=>clean(x["Generation"])))];

html += `<div class="step-title">3. Generation wählen</div><div class="grid">`;

gens.forEach(g=>{
let f = fahrzeuge.find(x=>clean(x["Generation"])===g);

html += `
<div class="card" onclick="selectGen('${g}')">
<img src="${f?.Bild || ''}" style="max-width:120px;"><br>
${g}
</div>`;
});

html += `</div>`;
}

/* MOTOR */
if(state.generation){
let motors=[...new Set(mapping.filter(x=>
clean(x["Reihe"])===state.reihe &&
clean(x["Modell"])===state.modell &&
clean(x["Generation"])===state.generation
).map(x=>clean(x["Motor"])))];

html += `<div class="step-title">4. Motor wählen</div><div class="grid">`;
motors.forEach(m=>{
html += `<div class="card" onclick="selectMotor('${m}')">${m}</div>`;
});
html += `</div>`;
}

/* PRODUKTE */
if(state.motor){

let tnList=mapping.filter(x=>
clean(x["Reihe"])===state.reihe &&
clean(x["Modell"])===state.modell &&
clean(x["Generation"])===state.generation &&
clean(x["Motor"])===state.motor
).map(x=>clean(x["TN"]));

let results=produkte.filter(p=>tnList.includes(clean(p["TN"])));

results.forEach(r=>{

let lager=parseInt(r["Lager"])||0;
let status=lager>3?"green":lager>0?"orange":"red";
let text=lager>3?"Sofort verfügbar":lager>0?"Wenig Lager":"Nicht verfügbar";

html += `
<div class="product">

<div class="product-left">
<img src="${r["Bild"]}">
<div>
<div><b>${r["Bezeichnung"]}</b></div>
<div>${r["Reifen"]}</div>
<div>${r["Dimension"]}</div>
</div>
</div>

<div>
${r["VP"] ? `<div class="old-price">${r["VP"]} CHF</div>` : ""}
<div class="new-price">${r["Angebotspreis"]} CHF</div>
<div class="${status}">${text}</div>
<button class="button">Auswählen</button>
</div>

</div>`;
});

}

document.getElementById("app").innerHTML = html;
}

/* ACTIONS */
function selectReihe(r){ state.reihe=r; state.modell=null; state.generation=null; state.motor=null; render(); }
function selectModell(m){ state.modell=m; state.generation=null; state.motor=null; render(); }
function selectGen(g){ state.generation=g; state.motor=null; render(); }
function selectMotor(m){ state.motor=m; render(); }

</script>

</body>
</html>
