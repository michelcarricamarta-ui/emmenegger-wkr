<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WKR Konfigurator</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
}

/* 👉 BREITER */
.container {
    max-width: 1500px;
    margin: auto;
    background: white;
    padding: 40px;
    border-radius: 12px;
}

/* HEADER */
.logo {
    text-align: center;
    margin-bottom: 30px;
}
.logo img { max-width: 500px; }

h2 { text-align:center; }

/* 👉 AUSWAHL BOX */
.summary-box {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f3f3f3;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 40px;
}

.summary-text {
    font-size: 15px;
    line-height: 1.6;
}

.summary-img img {
    max-width: 140px;
}

/* GRID */
.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 15px;
}

/* CARD */
.card {
    border: 1px solid #ccc;
    padding: 15px;
    cursor: pointer;
    border-radius: 10px;
    background: white;
    text-align: center;
    min-width: 180px;
    transition: 0.2s;
}

.card:hover {
    border-color: #1c69d4;
    transform: scale(1.04);
}

.card img {
    max-width: 160px;
    margin-bottom: 10px;
}

/* PRODUKT */
.product-wrapper {
    display: flex;
    justify-content: center;
}

.product {
    width: 900px;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #ddd;
    padding: 25px 0;
}

.product-left {
    display: flex;
    gap: 25px;
}

.product-left img {
    width: 240px;
    border-radius: 8px;
}

.product-title {
    font-weight: bold;
    font-size: 18px;
}

.old-price {
    text-decoration: line-through;
    color: #888;
}

.new-price {
    font-size: 24px;
    font-weight: bold;
}

.green { color: green; }
.orange { color: orange; }
.red { color: red; }

.hinweis {
    margin-top: 10px;
    font-size: 12px;
    color: #555;
}

/* BUTTON */
.button {
    background: #555;
    color: white;
    padding: 10px;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="https://raw.githubusercontent.com/michelcarricamarta-ui/emmenegger-wkr/main/BMW_MINI_Emmenegger_rechtsbuendig_claim_rgb_pos.png">
<h2>Winterkompletträder Konfigurator</h2>
</div>

<div id="app"></div>

</div>

<script>

const urlProdukte = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Produkte";
const urlMapping = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Zuordnung";
const urlFahrzeuge = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Fahrzeuge";

let produkte=[], mapping=[], fahrzeuge=[];

let state = { reihe:null, modell:null, motor:null };

function clean(v){ return (v||"").toString().trim(); }

Promise.all([
fetch(urlProdukte).then(r=>r.json()),
fetch(urlMapping).then(r=>r.json()),
fetch(urlFahrzeuge).then(r=>r.json())
]).then(([p,m,f])=>{
produkte=p;
mapping=m;
fahrzeuge=f;
render();
});

/* RENDER */
function render(){

let html="";

/* 👉 IHRE AUSWAHL */
if(state.motor){

let fahrzeug = fahrzeuge.find(f =>
clean(f["Reihe"])===state.reihe &&
clean(f["Modell"])===state.modell
);

html += `
<div class="summary-box">

<div class="summary-text">
<b>Ihre Auswahl:</b><br>
Reihe: ${state.reihe}<br>
Modell: ${state.modell}<br>
Motor: ${state.motor}

<br><br>

<button onclick="resetSelection()" class="button">
Auswahl ändern
</button>

</div>
<div class="summary-text">
<b>Ihre Auswahl:</b><br>
Reihe: ${state.reihe}<br>
Modell: ${state.modell}<br>
Motor: ${state.motor}
</div>

<div class="summary-img">
<img src="${clean(fahrzeug?.Bild) || 'https://via.placeholder.com/150'}">
</div>

</div>
`;
}

if(!state.motor){

/* 1. REIHE */
let reihen=[...new Set(mapping.map(x=>clean(x["Reihe"])))];

html+=`<div><b>1. Reihe wählen</b></div><div class="grid">`;

reihen.forEach(r=>{
html+=`<div class="card" onclick="selectReihe('${r}')">${r}</div>`;
});

html+=`</div>`;
}

/* 2. MODELL */
if(state.reihe && !state.motor){

let modelle=[...new Set(mapping
.filter(x=>clean(x["Reihe"])===state.reihe)
.map(x=>clean(x["Modell"]))
)];

html+=`<div style="margin-top:30px;"><b>2. Modell wählen</b></div><div class="grid">`;

modelle.forEach(m=>{

let fahrzeug = fahrzeuge.find(f =>
clean(f["Reihe"])===state.reihe &&
clean(f["Modell"])===m
);

html+=`
<div class="card" onclick="selectModell('${m}')">
<img src="${clean(fahrzeug?.Bild) || 'https://via.placeholder.com/150'}">
<div>${m}</div>
</div>`;
});

html+=`</div>`;
}

/* 3. MOTOR */
if(state.modell && !state.motor){

let motors=[...new Set(mapping
.filter(x=>
clean(x["Reihe"])===state.reihe &&
clean(x["Modell"])===state.modell
)
.map(x=>clean(x["Motor"]))
)];

html+=`<div style="margin-top:30px;"><b>3. Motor wählen</b></div><div class="grid">`;

motors.forEach(m=>{
html+=`<div class="card" onclick="selectMotor('${m}')">${m}</div>`;
});

html+=`</div>`;
}

/* PRODUKTE */
if(state.motor){

let tnList=mapping.filter(x=>
clean(x["Reihe"])===state.reihe &&
clean(x["Modell"])===state.modell &&
clean(x["Motor"])===state.motor
).map(x=>clean(x["TN"]));

let results=produkte.filter(p=>tnList.includes(clean(p["TN"])));

html+=`<div class="product-wrapper">`;

results.forEach(r=>{

let lager=parseInt(r["Lager"])||0;
let status=lager>3?"green":lager>0?"orange":"red";
let text=lager>3?"Sofort verfügbar":lager>0?"Wenig Lager":"Nicht verfügbar";

html+=`
<div class="product">

<div class="product-left">
<img src="${clean(r["Bild"])}">
<div>
<div class="product-title">${r["Bezeichnung"]}</div>
${r["Reifen"]}<br>
${r["Dimension"]}

${r["Hinweistext"] ? `<div class="hinweis">${r["Hinweistext"].replace(/\n/g,"<br>")}</div>` : ""}
</div>
</div>

<div>
${r["VP"] ? `<div class="old-price">${r["VP"]} CHF</div>` : ""}
<div class="new-price">${r["Angebotspreis"]} CHF</div>
<div class="${status}">${text}</div>
<button class="button">Auswählen</button>
</div>

</div>`;
});

html+=`</div>`;
}

document.getElementById("app").innerHTML=html;
}

/* ACTIONS */
function selectReihe(r){
state.reihe=r;
state.modell=null;
state.motor=null;
render();
}

function selectModell(m){
state.modell=m;
state.motor=null;
render();
}

function selectMotor(m){
state.motor=m;
render();
}
    
function resetSelection(){
    state.reihe = null;
    state.modell = null;
    state.motor = null;
    render();
}
    
</script>

</body>
</html>
