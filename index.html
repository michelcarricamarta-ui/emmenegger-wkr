<script>

const url = "https://opensheet.elk.sh/1nVDxSSX2yJ-MBLUZKF4alNXIAPlYHHeb0wcOJG4b0qE/1";

fetch(url)
.then(res => res.json())
.then(data => {

    let currentModel = "";
    let cleanData = [];

    data.forEach(row => {

        if (row["Modell"]) {
            currentModel = row["Modell"];
        }

        if (row["TN"]) {
            row["Modell"] = currentModel;
            cleanData.push(row);
        }

    });

    window.reifenData = cleanData;

    let modelle = [...new Set(cleanData.map(x => x["Modell"]))];

    let select = document.getElementById("modell");
    select.innerHTML = '<option value="">Modell wählen</option>';

    modelle.forEach(m => {
        let option = document.createElement("option");
        option.value = m;
        option.text = m;
        select.appendChild(option);
    });

});

document.getElementById("modell").addEventListener("change", function() {

    let value = this.value;

    let results = window.reifenData.filter(x => x["Modell"] === value);

    let html = "";

    results.forEach(r => {

        let preis = r["Kundenpreis inkl. MwSt"] || "-";
        let lager = parseInt(r["Menge an Lager"]) || 0;

        let lagerText = lager > 3 
            ? `🟢 Lager: ${lager}` 
            : lager > 0 
                ? `🟠 nur noch ${lager} Stück` 
                : `🔴 aktuell nicht verfügbar`;

        html += `
<div class="card">

    <img src="${r["Bild"] || "https://via.placeholder.com/300"}">

    <h3>${r["Modell"] || "-"}</h3>

    <p><strong>${r["Bezeichnung"] || "-"}</strong></p>

    <p style="font-weight:600;">
        ${r["Dimension"] || ""}
    </p>

    <p>${r["Reifen"] || ""}</p>

    <p style="font-size:12px; color:gray; line-height:1.4;">
        ${(r["Hinweistext"] || "").replace(/\n/g, "<br>")}
    </p>

    <p>${lagerText}</p>

    <strong style="font-size:18px;">${preis} CHF</strong>

</div>`;
    });

    document.getElementById("results").innerHTML = html;

});

</script>
