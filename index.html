<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WKR Konfigurator</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

.container {
    max-width: 1200px;
    margin: 20px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
}

/* LOGO */
.logo {
    text-align: center;
    margin-bottom: 30px;
}

.logo img {
    max-width: 500px;
}

/* FILTER */
.select-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 30px;
}

select {
    padding: 10px;
}

/* LAYOUT */
.layout {
    display: flex;
    gap: 40px;
}

.left {
    flex: 3;
}

/* PRODUKT */
.product {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #ddd;
    padding: 20px 0;
}

.product-left {
    display: flex;
    gap: 25px;
}

.product-left img {
    width: 240px;
    cursor: pointer;
    border-radius: 8px;
}

.product-info {
    max-width: 450px;
}

.product-title {
    font-weight: bold;
    font-size: 18px;
}

.product-right {
    text-align: right;
}

/* PREISE */
.old-price {
    text-decoration: line-through;
    color: #888;
    font-size: 14px;
}

.hinweis {
    margin-top: 10px;
    font-size: 12px;
    color: #555;
    line-height: 1.5;
}
    
.new-price {
    font-size: 24px;
    font-weight: bold;
}

.discount {
    color: red;
    font-size: 13px;
}

.available {
    font-weight: bold;   /* KEIN color hier! */
}

.green { color: green; }
.orange { color: orange; }
.red { color: red; }
    
/* BUTTON */
.button {
    background: #555;
    color: white;
    padding: 10px 20px;
    border: none;
    cursor: pointer;
    margin-top: 10px;
}

.button:hover {
    background: black;
}

/* POPUP */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    background: rgba(0,0,0,0.8);
    width: 100%;
    height: 100%;
}

.modal img {
    display: block;
    margin: 100px auto;
    max-width: 60%;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
    <img src="https://raw.githubusercontent.com/michelcarricamarta-ui/emmenegger-wkr/main/BMW_MINI_Emmenegger_rechtsbuendig_claim_rgb_pos.png">
    <h1 class="title">Winterkompletträder Konfigurator</h1>
</div>

<div class="select-row">
<select id="reihe"></select>
<select id="modell"></select>
<select id="generation"></select>
<select id="motor"></select>
</div>

<div id="mainContent"></div>

</div>

<div id="modal" class="modal" onclick="this.style.display='none'">
<img id="modalImg">
</div>

<script>

const urlProdukte = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Produkte";
const urlMapping = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Zuordnung";
const urlFahrzeuge = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Fahrzeuge";

let produkte = [];
let mapping = [];
let fahrzeuge = [];

function clean(v){ return (v||"").toString().trim(); }
function getImageUrl(url){ return url || "https://via.placeholder.com/150"; }

function openImg(src){
    document.getElementById("modalImg").src = src;
    document.getElementById("modal").style.display = "block";
}

Promise.all([
fetch(urlProdukte).then(r=>r.json()),
fetch(urlMapping).then(r=>r.json()),
fetch(urlFahrzeuge).then(r=>r.json())
]).then(([p,m,f])=>{
produkte=p; mapping=m; fahrzeuge=f; init();
});

function init(){
let reihen=[...new Set(mapping.map(x=>clean(x["Reihe"])))];
let el=document.getElementById("reihe");
el.innerHTML="<option value=''>Reihe wählen (z.B. BMW 1er)</option>";
reihen.forEach(r=>el.add(new Option(r,r)));
}

document.getElementById("reihe").onchange=function(){
let modelle=[...new Set(mapping.filter(x=>clean(x["Reihe"])===this.value).map(x=>clean(x["Modell"])))];
let el=document.getElementById("modell");
el.innerHTML="<option value=''>Modell wählen (z.B. 5-Türer)</option>";
modelle.forEach(m=>el.add(new Option(m,m)));
};

document.getElementById("modell").onchange=function(){
let reihe=document.getElementById("reihe").value;
let gens=[...new Set(mapping.filter(x=>clean(x["Reihe"])===reihe && clean(x["Modell"])===this.value).map(x=>clean(x["Generation"])))];
let el=document.getElementById("generation");
el.innerHTML="<option value=''>Baujahr / Generation wählen</option>";
gens.forEach(g=>el.add(new Option(g,g)));
};

document.getElementById("generation").onchange=function(){

let reihe=document.getElementById("reihe").value;
let modell=document.getElementById("modell").value;
let generation=this.value;

/* MOTOR */
let motors=[...new Set(
mapping
.filter(x =>
clean(x["Reihe"])===reihe &&
clean(x["Modell"])===modell &&
clean(x["Generation"])===generation
)
.map(x => clean(x["Motor"]))
)];

let el=document.getElementById("motor");
el.innerHTML="<option value=''>Motorisierung wählen</option>";
motors.forEach(m=>el.add(new Option(m,m)));

/* Fahrzeugbild */
let fahrzeug=fahrzeuge.find(f=>
clean(f["Reihe"])===reihe &&
clean(f["Modell"])===modell &&
clean(f["Generation"])===generation
);

document.getElementById("mainContent").innerHTML =
fahrzeug ? `
<div style="text-align:center; margin-top:20px;">
    <img src="${getImageUrl(fahrzeug["Bild"])}" style="max-width:250px;">
    <div style="margin-top:10px; font-size:14px; color:#666;">
        ${modell} ${generation}
    </div>
</div>
` : "";

document.getElementById("motor").onchange=function(){

let reihe=document.getElementById("reihe").value;
let modell=document.getElementById("modell").value;
let gen=document.getElementById("generation").value;

let tnList=mapping.filter(x=>clean(x["Reihe"])===reihe && clean(x["Modell"])===modell && clean(x["Generation"])===gen && clean(x["Motor"])===this.value).map(x=>clean(x["TN"]));

let results=produkte.filter(p=>tnList.includes(clean(p["TN"])));

render(results);
};

function render(results){

let html=`<div class="layout"><div class="left">`;

results.forEach(r=>{
let lager = parseInt(r["Lager"]) || 0;

let lagerText = "";
let lagerClass = "";

if (lager > 3) {
    lagerText = "Sofort verfügbar";
    lagerClass = "green";
} else if (lager > 0) {
    lagerText = "Wenig Lager";
    lagerClass = "orange";
} else {
    lagerText = "Nicht verfügbar";
    lagerClass = "red";
}
let vp = parseFloat((r["VP"] || "").toString().replace(",", "."));
let angebot = parseFloat((r["Angebotspreis"] || r["Preis"] || "").toString().replace(",", "."));

let rabatt = (vp && angebot) ? Math.round((1 - angebot/vp) * 100) : null;

html+=`
<div class="product">

<div class="product-left">
<img src="${getImageUrl(r["Bild"])}" onclick="openImg('${getImageUrl(r["Bild"])}')">

<div class="product-info">

<div class="product-title">${r["Bezeichnung"]||""}</div>

<div>${r["Reifen"]||""}</div>
<div>${r["Dimension"]||""}</div>

${r["Hinweistext"] ? `
<div class="hinweis">
${r["Hinweistext"]}
</div>
` : ""}

</div>

</div>

<div class="product-right">

<div>Pro Satz inkl. Montage</div>

${vp ? `<div class="old-price">${vp} CHF</div>` : ""}

<div class="new-price">${angebot || "-"} CHF</div>

${rabatt ? `<div class="discount">-${rabatt}%</div>` : ""}

<div class="available ${lagerClass}">${lagerText}</div>

<button class="button">Auswählen</button>

</div>

</div>`;
});

html+=`</div></div>`;

document.getElementById("mainContent").innerHTML=html;
}
</script>

</body>
</html>
