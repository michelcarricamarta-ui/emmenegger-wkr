<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WKR Konfigurator</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

.container {
    max-width: 1400px;
    margin: 40px auto;
    background: white;
    padding: 40px;
    border-radius: 12px;
}

.logo {
    text-align: center;
    margin-bottom: 20px;
}
.logo img {
    max-width: 500px;
}

h2 {
    text-align: center;
}

.section-title {
    font-weight: bold;
    font-size: 18px;
    margin-top: 30px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 25px;
    margin-top: 15px;
}

.reihe-card {
    padding: 30px;
    text-align: center;
    border-radius: 12px;
    border: 2px solid #ddd;
    cursor: pointer;
    font-size: 20px;
    font-weight: bold;
}

.reihe-card:hover {
    border-color: #1c69d4;
    background: #f5f9ff;
}

.card {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    transition: 0.25s;
}

.card:hover {
    transform: scale(1.03);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: contain;
    background: #f9f9f9;
}

.card-title {
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

.summary-box {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f3f3f3;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 30px;
}

.summary-img img {
    max-width: 140px;
}

.preview {
    text-align: center;
    margin-bottom: 20px;
}

.preview img {
    width: 550px;
    max-width: 100%;
}

.product {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #ddd;
    padding: 25px 0;
}

.product-left {
    display: flex;
    gap: 20px;
}

.product-left img {
    width: 220px;
    transition: 0.3s;
    cursor: pointer;
}

.product-left img:hover {
    transform: scale(1.1);
}

.old-price {
    text-decoration: line-through;
    color: #888;
}

.new-price {
    font-size: 22px;
    font-weight: bold;
}

.green { color: green; }
.red { color: red; }

.hinweis {
    font-size: 12px;
    margin-top: 10px;
    color: #555;
}

.button {
    background: #1c69d4;
    color: white;
    padding: 10px 15px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    margin-top: 10px;
}

.form-box {
    margin-top: 40px;
    padding: 20px;
    background: #f3f3f3;
    border-radius: 10px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="https://raw.githubusercontent.com/michelcarricamarta-ui/emmenegger-wkr/main/BMW_MINI_Emmenegger_rechtsbuendig_claim_rgb_pos.png">
<h2>Winterkompletträder Konfigurator</h2>
</div>

<div id="app"></div>

</div>

<script>

const urlProdukte = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Produkte";
const urlMapping = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Zuordnung";
const urlFahrzeuge = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Fahrzeuge";

let produkte=[], mapping=[], fahrzeuge=[];
let state = { reihe:null, modell:null, motor:null, produkt:null, produktPreview:null };

function clean(v){ return (v||"").toString().trim(); }

Promise.all([
fetch(urlProdukte).then(r=>r.json()),
fetch(urlMapping).then(r=>r.json()),
fetch(urlFahrzeuge).then(r=>r.json())
]).then(([p,m,f])=>{
produkte=p;
mapping=m;
fahrzeuge=f;
render();
});

function render(){

let html="";

/* SUMMARY */
if(state.motor){
let fahrzeug = fahrzeuge.find(f =>
clean(f["Reihe"])===state.reihe &&
clean(f["Modell"])===state.modell
);

html+=`
<div class="summary-box">
<div>
<b>Ihre Auswahl:</b><br>
${state.reihe} / ${state.modell} / ${state.motor}<br><br>
<button class="button" onclick="resetSelection()">Zurück</button>
</div>
<div class="summary-img">
<img src="${clean(fahrzeug?.Bild) || 'https://via.placeholder.com/150'}">
</div>
</div>`;
}

/* PREVIEW */
if(state.produktPreview){
html+=`<div class="preview"><img src="${state.produktPreview["Bild"]}"></div>`;
}

/* PRODUKTE */
if(state.motor){

let tnList=mapping.filter(x=>
clean(x["Reihe"])===state.reihe &&
clean(x["Modell"])===state.modell &&
clean(x["Motor"])===state.motor
).map(x=>clean(x["TN"]));

let results=produkte.filter(p=>tnList.includes(clean(p["TN"])));

results.forEach(r=>{

let lager = parseInt(r["Lager"]) || 0;
let status = lager > 0 ? "green" : "red";
let text = lager > 0 ? "Verfügbar" : "Auf Bestellung";

let vp = parseFloat(r["VP"]) || 0;
let angebot = parseFloat(r["Angebotspreis"]) || 0;

let preisHTML = "";

if(angebot > 0){
    preisHTML = `
    <div class="old-price">VP: ${vp} CHF</div>
    <div class="new-price">Angebotspreis: ${angebot} CHF</div>
    `;
} else {
    preisHTML = `
    <div class="new-price">${vp} CHF</div>
    `;
}

html+=`
<div class="product">

<div class="product-left">
<img src="${clean(r["Bild"])}" onclick='showPreview(${JSON.stringify(r)})'>
<div>
<b>${r["Bezeichnung"]}</b><br>
${r["Reifen"]}<br>
${r["Dimension"]}

${r["Hinweistext"] ? `
<div class="hinweis">
${r["Hinweistext"].replace(/\n/g,"<br>")}
<br><br>
Teilenummer: ${r["TN"]}
</div>` : `<div class="hinweis">Teilenummer: ${r["TN"]}</div>`}
</div>
</div>

<div>
${preisHTML}

<div style="font-size:11px; color:#777;">Preise inkl. MwST</div>

<div class="${status}">${text}</div>

${lager === 0 ? `<div style="font-size:12px;">Lieferzeit ca. 5–10 Arbeitstage</div>` : ""}

<button class="button" onclick='selectProdukt(${JSON.stringify(r)})'>Auswählen</button>
</div>

</div>`;
});
}

document.getElementById("app").innerHTML=html;
}

function showPreview(p){ state.produktPreview=p; render(); }
function selectProdukt(p){ state.produkt=p; render(); }
function resetSelection(){ state={reihe:null,modell:null,motor:null,produkt:null,produktPreview:null}; render(); }

</script>

</body>
</html>
