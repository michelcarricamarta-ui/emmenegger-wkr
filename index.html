<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WKR Konfigurator</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
}

/* CONTAINER */
.container {
    max-width: 1500px;
    margin: auto;
    background: white;
    padding: 80px 40px 40px 40px;
    border-radius: 12px;
    position: relative;
}

/* LOGO */
.logo-top {
    position: absolute;
    top: 20px;
    right: 30px;
}
.logo-top img { width: 260px; }

/* HERO */
.hero {
    position: relative;
    height: 300px;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 30px;
    background-image: url('https://github.com/michelcarricamarta-ui/emmenegger-wkr/blob/main/WINTER%20Ix3.jpg?raw=true');
    background-size: cover;
    background-position: center;
}

.hero-text {
    position: absolute;
    bottom: 30px;
    left: 40px;
    color: white;
    font-size: 22px;
    font-weight: bold;
}

/* GRID */
.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

/* CARD */
.card {
    border: 1px solid #ccc;
    padding: 15px;
    cursor: pointer;
    border-radius: 10px;
    min-width: 180px;
}
.card:hover {
    border-color: #1c69d4;
}

/* PRODUKT */
.product {
    width: 1100px;
    margin: auto;
    display: flex;
    justify-content: space-between;
    padding: 25px 0;
    border-bottom: 1px solid #ddd;
}

.product-left {
    display: flex;
    gap: 20px;
}

.product-left img {
    width: 250px;
}

.old-price {
    text-decoration: line-through;
    color: #888;
}

.new-price {
    font-size: 26px;
    font-weight: bold;
}

.small {
    font-size: 11px;
}

.button {
    background: #1c69d4;
    color: white;
    padding: 10px;
    border: none;
    cursor: pointer;
    margin-top:10px;
}

/* MODAL */
.modal {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content {
    background:white;
    padding:20px;
    border-radius:10px;
    width:400px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo-top">
<img src="https://raw.githubusercontent.com/michelcarricamarta-ui/emmenegger-wkr/main/BMW_MINI_Emmenegger_rechtsbuendig_claim_rgb_pos.png">
</div>

<div class="hero">
<div class="hero-text">
Original Winterkompletträder – perfekt auf Ihr Fahrzeug abgestimmt
</div>
</div>

<h2>Winterkompletträder Konfigurator</h2>

<div id="app"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">

<input id="name" placeholder="Name *">
<input id="email" placeholder="E-Mail *">
<input id="schild" placeholder="Kontrollschild">
<textarea id="bemerkung" placeholder="Bemerkung"></textarea>

<button onclick="sendMail()" class="button">Anfrage senden</button>
<button onclick="closeModal()">Schliessen</button>

</div>
</div>

<script>

const urlProdukte = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Produkte";
const urlMapping = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Zuordnung";
const urlFahrzeuge = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Fahrzeuge";

let produkte=[], mapping=[], fahrzeuge=[];
let state = { reihe:null, modell:null, motor:null };

function clean(v){ return (v||"").toString().trim(); }

Promise.all([
fetch(urlProdukte).then(r=>r.json()),
fetch(urlMapping).then(r=>r.json()),
fetch(urlFahrzeuge).then(r=>r.json())
]).then(([p,m,f])=>{
produkte=p;
mapping=m;
fahrzeuge=f;
render();
});

function render(){

let html="";

/* AUSWAHL */
if(!state.reihe){

let reihen=[...new Set(mapping.map(x=>clean(x["Reihe"])))];

html+=`<div><b>1. Reihe wählen</b></div><div class="grid">`;

reihen.forEach(r=>{
html+=`<div class="card" onclick="selectReihe('${r}')">${r}</div>`;
});

html+=`</div>`;
}

if(state.reihe && !state.modell){

let modelle=[...new Set(mapping.filter(x=>clean(x["Reihe"])===state.reihe).map(x=>clean(x["Modell"])))];

html+=`<div><b>2. Modell wählen</b></div><div class="grid">`;

modelle.forEach(m=>{
html+=`<div class="card" onclick="selectModell('${m}')">${m}</div>`;
});

html+=`</div>`;
}

if(state.modell && !state.motor){

let motors=[...new Set(mapping.filter(x=>clean(x["Modell"])===state.modell).map(x=>clean(x["Motor"])))];

html+=`<div><b>3. Motor wählen</b></div><div class="grid">`;

motors.forEach(m=>{
html+=`<div class="card" onclick="selectMotor('${m}')">${m}</div>`;
});

html+=`</div>`;
}

/* PRODUKTE */
if(state.motor){

let tnList=mapping.filter(x=>clean(x["Motor"])===state.motor).map(x=>clean(x["TN"]));
let results=produkte.filter(p=>tnList.includes(clean(p["TN"])));

results.forEach(r=>{

let lager=parseInt(r["Lager"])||0;

html+=`
<div class="product">

<div class="product-left">
<img src="${clean(r["Bild"])}">
<div>
<b>${r["Bezeichnung"]}</b><br>
${r["Dimension"]}
</div>
</div>

<div>
<div class="small">inkl. Montage</div>
<div class="old-price">${r["VP"]} CHF</div>
<div class="new-price">${r["Angebotspreis"]} CHF</div>
<div class="small">alle Preise inkl. MwSt.</div>

${lager>0 
? '<div style="color:green">An Lager</div>' 
: '<div style="color:red">Auf Bestellung<br>Lieferzeit 5-10 Arbeitstage</div>'}

<button class="button" onclick="openModal('${r["Bezeichnung"]}')">
Auswählen
</button>

</div>

</div>`;
});

}

document.getElementById("app").innerHTML=html;
}

/* ACTIONS */
function selectReihe(r){ state.reihe=r; render(); }
function selectModell(m){ state.modell=m; render(); }
function selectMotor(m){ state.motor=m; render(); }

/* MODAL */
let selectedProduct="";

function openModal(p){
selectedProduct=p;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function sendMail(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;

if(!name || !email){
alert("Bitte Pflichtfelder ausfüllen");
return;
}

window.location.href=`mailto:tv-g-fp@emmeneggerag.ch?subject=WKR Anfrage&body=Produkt: ${selectedProduct}`;
}

</script>

</body>
</html>
