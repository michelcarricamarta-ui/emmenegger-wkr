<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WKR Konfigurator</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
}

/* CONTAINER */
.container {
    max-width: 1400px;
    margin: auto;
    background: white;
    padding: 40px;
    border-radius: 12px;
}

/* TITEL */
.section-title {
    font-weight: bold;
    font-size: 18px;
    margin-top: 30px;
    margin-bottom: 10px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 25px;
}

/* 👉 REIHE BOXEN */
.reihe-card {
    padding: 30px;
    text-align: center;
    border-radius: 12px;
    border: 2px solid #ddd;
    cursor: pointer;
    font-size: 20px;
    font-weight: bold;
    transition: 0.2s;
}

.reihe-card:hover {
    border-color: #1c69d4;
    background: #f5f9ff;
}

/* MODEL CARD */
.card {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    transition: all 0.25s ease;
}

.card:hover {
    transform: scale(1.03);
}

/* IMAGE */
.card img {
    width: 100%;
    height: 150px;
    object-fit: contain;
    background: #f9f9f9;
}

.card-title {
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

/* PRODUKTE */
.product {
    display: flex;
    justify-content: space-between;
    padding: 25px 0;
    border-bottom: 1px solid #ddd;
}

/* 👉 HOVER ZOOM FELGE */
.product-left img {
    width: 220px;
    transition: transform 0.3s ease;
    cursor: pointer;
}

.product-left img:hover {
    transform: scale(1.1);
}

/* 👉 GROSSES PREVIEW */
.preview {
    text-align: center;
    margin-bottom: 30px;
}

.preview img {
    width: 400px;
}

/* BUTTON */
.button {
    background: #1c69d4;
    color: white;
    padding: 10px 15px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    margin-top: 10px;
}

/* FORM */
.form-box {
    margin-top: 40px;
    padding: 20px;
    background: #f3f3f3;
    border-radius: 10px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Winterkompletträder Konfigurator</h2>
<div id="app"></div>

</div>

<script>

const urlProdukte = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Produkte";
const urlMapping = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Zuordnung";
const urlFahrzeuge = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Fahrzeuge";

let produkte=[], mapping=[], fahrzeuge=[];
let state = { reihe:null, modell:null, motor:null, produkt:null };

function clean(v){ return (v||"").toString().trim(); }

Promise.all([
fetch(urlProdukte).then(r=>r.json()),
fetch(urlMapping).then(r=>r.json()),
fetch(urlFahrzeuge).then(r=>r.json())
]).then(([p,m,f])=>{
produkte=p;
mapping=m;
fahrzeuge=f;
render();
});

function render(){

let html="";

/* 👉 PREVIEW FELGE */
if(state.produkt){
html+=`
<div class="preview">
<img src="${state.produkt["Bild"]}">
</div>`;
}

/* REIHE */
if(!state.reihe){
let reihen=[...new Set(mapping.map(x=>clean(x["Reihe"])))];

html+=`<div class="section-title">1. Reihe wählen</div><div class="grid">`;

reihen.forEach(r=>{
html+=`<div class="reihe-card" onclick="selectReihe('${r}')">${r}</div>`;
});

html+=`</div>`;
}

/* MODELL */
if(state.reihe && !state.modell){
let modelle=[...new Set(mapping
.filter(x=>clean(x["Reihe"])===state.reihe)
.map(x=>clean(x["Modell"]))
)];

html+=`<div class="section-title">2. Modell wählen</div><div class="grid">`;

modelle.forEach(m=>{

let fahrzeug = fahrzeuge.find(f =>
clean(f["Reihe"])===state.reihe &&
clean(f["Modell"])===m
);

let bild = clean(fahrzeug?.Bild) || "https://via.placeholder.com/400x200";

html+=`
<div class="card" onclick="selectModell('${m}')">
<img src="${bild}">
<div class="card-title">${m}</div>
</div>`;
});

html+=`</div>`;
}

/* MOTOR */
if(state.modell && !state.motor){
let motors=[...new Set(mapping
.filter(x=>
clean(x["Reihe"])===state.reihe &&
clean(x["Modell"])===state.modell
)
.map(x=>clean(x["Motor"]))
)];

html+=`<div class="section-title">3. Motor wählen</div><div class="grid">`;

motors.forEach(m=>{
html+=`<div class="reihe-card" onclick="selectMotor('${m}')">${m}</div>`;
});

html+=`</div>`;
}

/* PRODUKTE */
if(state.motor && !state.produkt){

let tnList=mapping.filter(x=>
clean(x["Reihe"])===state.reihe &&
clean(x["Modell"])===state.modell &&
clean(x["Motor"])===state.motor
).map(x=>clean(x["TN"]));

let results=produkte.filter(p=>tnList.includes(clean(p["TN"])));

results.forEach(r=>{
html+=`
<div class="product">

<div class="product-left">
<img src="${clean(r["Bild"])}" onclick='selectProdukt(${JSON.stringify(r)})'>
<div>
<b>${r["Bezeichnung"]}</b><br>
${r["Dimension"]}
</div>
</div>

<div>
<div><b>${r["Angebotspreis"]} CHF</b></div>
<button class="button" onclick='selectProdukt(${JSON.stringify(r)})'>Auswählen</button>
</div>

</div>`;
});
}

/* FORM */
if(state.produkt){
html+=`
<div class="form-box">

<h3>Ihre Anfrage</h3>

<b>${state.produkt["Bezeichnung"]}</b><br>

<input id="name" placeholder="Name">
<input id="email" placeholder="E-Mail">

<button class="button" onclick="sendMail()">Anfrage senden</button>

</div>`;
}

document.getElementById("app").innerHTML=html;
}

/* ACTIONS */
function selectReihe(r){ state.reihe=r; render(); }
function selectModell(m){ state.modell=m; render(); }
function selectMotor(m){ state.motor=m; render(); }
function selectProdukt(p){ state.produkt=p; render(); }

/* MAIL */
function sendMail(){
window.location.href = "mailto:tv-g-fp@emmeneggerag.ch";
}

</script>

</body>
</html>
