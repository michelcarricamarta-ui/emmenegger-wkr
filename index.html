<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WKR Konfigurator</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

.container {
    max-width: 1200px;
    margin: 20px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
}

/* LOGO */
.logo {
    text-align: center;
    margin-bottom: 30px;
}

.logo img {
    max-width: 500px;
}

/* FILTER */
.select-row {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-bottom: 30px;
}

select {
    padding: 12px;
    min-width: 160px;
}

/* GENERATION CARDS (BMW STYLE) */
.gen-cards {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-top: 20px;
}

.gen-card {
    border: 1px solid #ccc;
    padding: 10px;
    cursor: pointer;
    width: 150px;
    text-align: center;
    border-radius: 8px;
    background: white;
}

.gen-card:hover {
    border-color: #1c69d4;
}

.gen-card img {
    max-width: 120px;
}

/* PRODUKT */
.product {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #ddd;
    padding: 20px 0;
}

.product-left {
    display: flex;
    gap: 25px;
}

.product-left img {
    width: 240px;
    border-radius: 8px;
}

.product-info {
    max-width: 450px;
}

.product-title {
    font-weight: bold;
}

.old-price {
    text-decoration: line-through;
    color: #888;
}

.new-price {
    font-size: 22px;
    font-weight: bold;
}

.available {
    font-weight: bold;
}

.green { color: green; }
.orange { color: orange; }
.red { color: red; }

.button {
    background: #555;
    color: white;
    padding: 10px 20px;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="https://raw.githubusercontent.com/michelcarricamarta-ui/emmenegger-wkr/main/BMW_MINI_Emmenegger_rechtsbuendig_claim_rgb_pos.png">
<h1>Winterkompletträder Konfigurator</h1>
</div>

<div class="select-row">
<select id="reihe"></select>
<select id="modell"></select>
<select id="motor"></select>
</div>

<div id="generationCards"></div>
<div id="mainContent"></div>

</div>

<script>

const urlProdukte = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Produkte";
const urlMapping = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Zuordnung";
const urlFahrzeuge = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Fahrzeuge";

let produkte=[], mapping=[], fahrzeuge=[];
let selectedGeneration = "";

function clean(v){ return (v||"").toString().trim(); }

Promise.all([
fetch(urlProdukte).then(r=>r.json()),
fetch(urlMapping).then(r=>r.json()),
fetch(urlFahrzeuge).then(r=>r.json())
]).then(([p,m,f])=>{
produkte=p; mapping=m; fahrzeuge=f;
init();
});

function init(){
let reihen=[...new Set(mapping.map(x=>clean(x["Reihe"])))];
let el=document.getElementById("reihe");
el.innerHTML="<option value=''>Reihe wählen</option>";
reihen.forEach(r=>el.add(new Option(r,r)));
}

document.getElementById("reihe").onchange=function(){
let modelle=[...new Set(mapping.filter(x=>clean(x["Reihe"])===this.value).map(x=>clean(x["Modell"])))];
let el=document.getElementById("modell");
el.innerHTML="<option>Modell wählen</option>";
modelle.forEach(m=>el.add(new Option(m,m)));
};

document.getElementById("modell").onchange=function(){
let reihe=document.getElementById("reihe").value;

let gens=[...new Set(mapping.filter(x=>clean(x["Reihe"])===reihe && clean(x["Modell"])===this.value).map(x=>clean(x["Generation"])))];

let html='<div class="gen-cards">';

gens.forEach(g=>{
let f = fahrzeuge.find(x=>clean(x["Generation"])===g);

html+=`
<div class="gen-card" onclick="selectGeneration('${g}')">
<img src="${f?.Bild || ''}">
<div>${g}</div>
</div>`;
});

html+='</div>';

document.getElementById("generationCards").innerHTML=html;
};

function selectGeneration(gen){
selectedGeneration = gen;

let reihe=document.getElementById("reihe").value;
let modell=document.getElementById("modell").value;

let motors=[...new Set(mapping.filter(x=>
clean(x["Reihe"])===reihe &&
clean(x["Modell"])===modell &&
clean(x["Generation"])===gen
).map(x=>clean(x["Motor"])))];

let el=document.getElementById("motor");
el.innerHTML="<option>Motor wählen</option>";
motors.forEach(m=>el.add(new Option(m,m)));
}

document.getElementById("motor").onchange=function(){

let reihe=document.getElementById("reihe").value;
let modell=document.getElementById("modell").value;

let tnList=mapping.filter(x=>
clean(x["Reihe"])===reihe &&
clean(x["Modell"])===modell &&
clean(x["Generation"])===selectedGeneration &&
clean(x["Motor"])===this.value
).map(x=>clean(x["TN"]));

let results=produkte.filter(p=>tnList.includes(clean(p["TN"])));

render(results);
};

function render(results){

let html="";

results.forEach(r=>{

let lager=parseInt(r["Lager"])||0;
let status=lager>3?"green":lager>0?"orange":"red";
let text=lager>3?"Sofort verfügbar":lager>0?"Wenig Lager":"Nicht verfügbar";

html+=`
<div class="product">

<div class="product-left">
<img src="${r["Bild"]}">
<div class="product-info">
<div class="product-title">${r["Bezeichnung"]}</div>
<div>${r["Reifen"]}</div>
<div>${r["Dimension"]}</div>
</div>
</div>

<div>
<div>${r["VP"] ? `<span class="old-price">${r["VP"]} CHF</span>` : ""}</div>
<div class="new-price">${r["Angebotspreis"]} CHF</div>
<div class="${status}">${text}</div>
<button class="button">Auswählen</button>
</div>

</div>`;
});

document.getElementById("mainContent").innerHTML=html;
}

</script>

</body>
</html>
