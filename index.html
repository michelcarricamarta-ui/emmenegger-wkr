<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WKR Konfigurator</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

/* CONTAINER */
.container {
    max-width: 1400px;
    margin: 40px auto;
    background: white;
    padding: 40px;
    border-radius: 12px;
}

/* HEADER */
.logo {
    text-align: center;
    margin-bottom: 20px;
}
.logo img {
    max-width: 500px;
}

h2 {
    text-align: center;
}

/* TITEL */
.section-title {
    font-weight: bold;
    font-size: 18px;
    margin-top: 30px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 25px;
    margin-top: 15px;
}

/* REIHE BOX */
.reihe-card {
    padding: 30px;
    text-align: center;
    border-radius: 12px;
    border: 2px solid #ddd;
    cursor: pointer;
    font-size: 20px;
    font-weight: bold;
}

.reihe-card:hover {
    border-color: #1c69d4;
    background: #f5f9ff;
}

/* MODEL CARD */
.card {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    transition: 0.25s;
}

.card:hover {
    transform: scale(1.03);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: contain;
    background: #f9f9f9;
}

.card-title {
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

/* SUMMARY */
.summary-box {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f3f3f3;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 30px;
}

.summary-img img {
    max-width: 140px;
}

/* PREVIEW */
.preview {
    text-align: center;
    margin-bottom: 20px;
}

.preview img {
    width: 350px;
}

/* PRODUCT */
.product {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #ddd;
    padding: 25px 0;
}

.product-left {
    display: flex;
    gap: 20px;
}

.product-left img {
    width: 220px;
    transition: 0.3s;
    cursor: pointer;
}

.product-left img:hover {
    transform: scale(1.1);
}

/* PRICE */
.old-price {
    text-decoration: line-through;
    color: #888;
}

.new-price {
    font-size: 22px;
    font-weight: bold;
}

.green { color: green; }
.orange { color: orange; }
.red { color: red; }

.hinweis {
    font-size: 12px;
    margin-top: 10px;
    color: #555;
}

/* BUTTON */
.button {
    background: #1c69d4;
    color: white;
    padding: 10px 15px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    margin-top: 10px;
}

/* FORM */
.form-box {
    margin-top: 40px;
    padding: 20px;
    background: #f3f3f3;
    border-radius: 10px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="https://raw.githubusercontent.com/michelcarricamarta-ui/emmenegger-wkr/main/BMW_MINI_Emmenegger_rechtsbuendig_claim_rgb_pos.png">
<h2>Winterkompletträder Konfigurator</h2>
</div>

<div id="app"></div>

</div>

<script>

const urlProdukte = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Produkte";
const urlMapping = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Zuordnung";
const urlFahrzeuge = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Fahrzeuge";

let produkte=[], mapping=[], fahrzeuge=[];
let state = { reihe:null, modell:null, motor:null, produkt:null };

function clean(v){ return (v||"").toString().trim(); }

Promise.all([
fetch(urlProdukte).then(r=>r.json()),
fetch(urlMapping).then(r=>r.json()),
fetch(urlFahrzeuge).then(r=>r.json())
]).then(([p,m,f])=>{
produkte=p;
mapping=m;
fahrzeuge=f;
render();
});

function render(){

let html="";

/* SUMMARY */
if(state.motor){

let fahrzeug = fahrzeuge.find(f =>
clean(f["Reihe"])===state.reihe &&
clean(f["Modell"])===state.modell
);

html+=`
<div class="summary-box">
<div>
<b>Ihre Auswahl:</b><br>
${state.reihe} / ${state.modell} / ${state.motor}<br><br>
<button class="button" onclick="resetSelection()">Zurück</button>
</div>
<div class="summary-img">
<img src="${clean(fahrzeug?.Bild) || 'https://via.placeholder.com/150'}">
</div>
</div>
`;
}

/* PREVIEW */
if(state.produkt){
html+=`
<div class="preview">
<img src="${state.produkt["Bild"]}">
</div>`;
}

/* REIHE */
if(!state.reihe){
let reihen=[...new Set(mapping.map(x=>clean(x["Reihe"])))];

html+=`<div class="section-title">1. Reihe wählen</div><div class="grid">`;

reihen.forEach(r=>{
html+=`<div class="reihe-card" onclick="selectReihe('${r}')">${r}</div>`;
});

html+=`</div>`;
}

/* MODELL */
if(state.reihe && !state.modell){
let modelle=[...new Set(mapping.filter(x=>clean(x["Reihe"])===state.reihe).map(x=>clean(x["Modell"])))];

html+=`<div class="section-title">2. Modell wählen</div><div class="grid">`;

modelle.forEach(m=>{
let fahrzeug = fahrzeuge.find(f =>
clean(f["Reihe"])===state.reihe &&
clean(f["Modell"])===m
);

html+=`
<div class="card" onclick="selectModell('${m}')">
<img src="${clean(fahrzeug?.Bild) || 'https://via.placeholder.com/150'}">
<div class="card-title">${m}</div>
</div>`;
});

html+=`</div>`;
}

/* MOTOR */
if(state.modell && !state.motor){
let motors=[...new Set(mapping.filter(x=>
clean(x["Reihe"])===state.reihe &&
clean(x["Modell"])===state.modell
).map(x=>clean(x["Motor"])))];

html+=`<div class="section-title">3. Motor wählen</div><div class="grid">`;

motors.forEach(m=>{
html+=`<div class="reihe-card" onclick="selectMotor('${m}')">${m}</div>`;
});

html+=`</div>`;
}

/* PRODUKTE */
if(state.motor){

let tnList=mapping.filter(x=>
clean(x["Reihe"])===state.reihe &&
clean(x["Modell"])===state.modell &&
clean(x["Motor"])===state.motor
).map(x=>clean(x["TN"]));

let results=produkte.filter(p=>tnList.includes(clean(p["TN"])));

results.forEach(r=>{

let lager=parseInt(r["Lager"])||0;
let status=lager>3?"green":lager>0?"orange":"red";
let text=lager>3?"Sofort verfügbar":lager>0?"Wenig Lager":"Nicht verfügbar";

html+=`
<div class="product">

<div class="product-left">
<img src="${clean(r["Bild"])}" onclick='selectProdukt(${JSON.stringify(r)})'>
<div>
<b>${r["Bezeichnung"]}</b><br>
${r["Reifen"]}<br>
${r["Dimension"]}
${r["Hinweistext"] ? `<div class="hinweis">${r["Hinweistext"].replace(/\n/g,"<br>")}</div>` : ""}
</div>
</div>

<div>
${r["VP"] ? `<div class="old-price">${r["VP"]} CHF</div>` : ""}
<div class="new-price">${r["Angebotspreis"]} CHF</div>
<div class="${status}">${text}</div>
<button class="button" onclick='selectProdukt(${JSON.stringify(r)})'>Auswählen</button>
</div>

</div>`;
});
}

/* FORM */
if(state.produkt){
html+=`
<div class="form-box">

<h3>Ihre Anfrage</h3>

<b>${state.produkt["Bezeichnung"]}</b><br>

<input id="name" placeholder="Name">
<input id="email" placeholder="E-Mail">
<textarea id="bemerkung" placeholder="Bemerkung"></textarea>

<button class="button" onclick="sendMail()">Anfrage senden</button>

</div>`;
}

document.getElementById("app").innerHTML=html;
}

/* ACTIONS */
function selectReihe(r){ state.reihe=r; render(); }
function selectModell(m){ state.modell=m; render(); }
function selectMotor(m){ state.motor=m; render(); }
function selectProdukt(p){ state.produkt=p; render(); }

function resetSelection(){
state = { reihe:null, modell:null, motor:null, produkt:null };
render();
}

/* MAIL */
function sendMail(){
window.location.href = "mailto:tv-g-fp@emmeneggerag.ch";
}

</script>

</body>
</html>
