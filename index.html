<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WKR Konfigurator</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
}

.container {
    max-width: 1100px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
}

/* HEADER */
.logo {
    text-align: center;
    margin-bottom: 30px;
}
.logo img { max-width: 500px; }

/* GRID */
.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
}

/* CARDS */
.card {
    border: 1px solid #ccc;
    padding: 12px;
    cursor: pointer;
    border-radius: 8px;
    text-align: center;
    min-width: 150px;
}
.card:hover { border-color:#1c69d4; }

.card img { max-width:120px; }

/* SUMMARY */
.summary-box {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f3f3f3;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 30px;
}

.summary-left {
    font-size: 14px;
}

.summary-title {
    font-weight: bold;
    margin-bottom: 5px;
}

.summary-img img {
    max-width: 120px;
}

/* PRODUKTE */
.product {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #ddd;
    padding: 25px 0;
    max-width: 800px;
    margin: auto;
}

.product-left {
    display: flex;
    gap: 20px;
}

.product-left img {
    width: 180px;
    border-radius: 8px;
}

.old-price {
    text-decoration: line-through;
    color: #888;
    font-size: 14px;
}

.new-price {
    font-size: 22px;
    font-weight: bold;
}

.discount {
    color: red;
    font-size: 13px;
}

.hinweis {
    font-size: 12px;
    color: #555;
    margin-top: 8px;
    line-height: 1.4;
}

.green { color: green; }
.orange { color: orange; }
.red { color: red; }

.button {
    background: #555;
    color: white;
    padding: 10px;
    border: none;
    cursor: pointer;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="https://raw.githubusercontent.com/michelcarricamarta-ui/emmenegger-wkr/main/BMW_MINI_Emmenegger_rechtsbuendig_claim_rgb_pos.png">
<h2>Winterkompletträder Konfigurator</h2>
</div>

<div id="app"></div>

</div>

<script>

const urlProdukte = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Produkte";
const urlMapping = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Zuordnung";
const urlFahrzeuge = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Fahrzeuge";

let produkte=[], mapping=[], fahrzeuge=[];

let state = {
    reihe:null,
    modell:null,
    motor:null
};

function clean(v){ return (v||"").toString().trim(); }

Promise.all([
fetch(urlProdukte).then(r=>r.json()),
fetch(urlMapping).then(r=>r.json()),
fetch(urlFahrzeuge).then(r=>r.json())
]).then(([p,m,f])=>{
produkte=p;
mapping=m;
fahrzeuge=f;
render();
});

function render(){

let html="";

/* 🔥 SUMMARY + PRODUKTE */
if(state.motor){

let fahrzeug = fahrzeuge.find(f =>
clean(f["Reihe"])===state.reihe &&
clean(f["Modell"])===state.modell
);

/* SUMMARY */
html += `
<div class="summary-box">
    <div class="summary-left">
        <div class="summary-title">Deine Auswahl</div>
        Reihe: ${state.reihe}<br>
        Modell: ${state.modell}<br>
        Motor: ${state.motor}
    </div>

    <div class="summary-img">
        <img src="${fahrzeug?.Bild || ''}">
    </div>
</div>
`;

/* PRODUKTE */
let tnList=mapping.filter(x=>
clean(x["Reihe"])===state.reihe &&
clean(x["Modell"])===state.modell &&
clean(x["Motor"])===state.motor
).map(x=>clean(x["TN"]));

let results=produkte.filter(p=>tnList.includes(clean(p["TN"])));

results.forEach(r=>{

let lager=parseInt(r["Lager"])||0;
let status=lager>3?"green":lager>0?"orange":"red";
let text=lager>3?"Sofort verfügbar":lager>0?"Wenig Lager":"Nicht verfügbar";

let vp = parseFloat((r["VP"]||"").replace(",","."));
let angebot = parseFloat((r["Angebotspreis"]||"").replace(",","."));

let rabatt = (vp && angebot) ? Math.round((1-angebot/vp)*100) : null;

html+=`
<div class="product">

<div class="product-left">
<img src="${r["Bild"]}">
<div>
<b>${r["Bezeichnung"]}</b><br>
${r["Reifen"]}<br>
${r["Dimension"]}

${r["Hinweistext"] ? `<div class="hinweis">${r["Hinweistext"].replace(/\n/g,"<br>")}</div>` : ""}
</div>
</div>

<div>
${vp ? `<div class="old-price">${vp} CHF</div>` : ""}
<div class="new-price">${angebot} CHF</div>
${rabatt ? `<div class="discount">-${rabatt}%</div>` : ""}

<div class="${status}">${text}</div>

<button class="button">Auswählen</button>
</div>

</div>`;
});

document.getElementById("app").innerHTML=html;
return;
}

/* 🔹 AUSWAHL */

/* REIHE */
let reihen=[...new Set(mapping.map(x=>clean(x["Reihe"])))];

html+=`<b>1. Reihe wählen</b><div class="grid">`;
reihen.forEach(r=>{
html+=`<div class="card" onclick="selectReihe('${r}')">${r}</div>`;
});
html+=`</div>`;

/* MODELL */
if(state.reihe){
let modelle=[...new Set(mapping.filter(x=>clean(x["Reihe"])===state.reihe).map(x=>clean(x["Modell"])))];

html+=`<br><b>2. Modell wählen</b><div class="grid">`;

modelle.forEach(m=>{
let f = fahrzeuge.find(x=>clean(x["Reihe"])===state.reihe && clean(x["Modell"])===m);

html+=`
<div class="card" onclick="selectModell('${m}')">
<img src="${f?.Bild || ''}">
<br>${m}
</div>`;
});

html+=`</div>`;
}

/* MOTOR */
if(state.modell){
let motors=[...new Set(mapping.filter(x=>clean(x["Reihe"])===state.reihe && clean(x["Modell"])===state.modell).map(x=>clean(x["Motor"])))];

html+=`<br><b>3. Motor wählen</b><div class="grid">`;

motors.forEach(m=>{
html+=`<div class="card" onclick="selectMotor('${m}')">${m}</div>`;
});

html+=`</div>`;
}

document.getElementById("app").innerHTML=html;
}

/* ACTIONS */
function selectReihe(r){
state.reihe=r;
state.modell=null;
state.motor=null;
render();
}

function selectModell(m){
state.modell=m;
state.motor=null;
render();
}

function selectMotor(m){
state.motor=m;
render();
}

</script>

</body>
</html>
