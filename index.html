<body>

<h2>Konfigurator</h2>

<select id="reihe"></select>
<select id="modell"></select>
<select id="generation"></select>
<select id="motor"></select>

<div id="fahrzeugBild"></div>
<div id="results"></div>

<script>

const urlProdukte = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Produkte";
const urlMapping = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Zuordnung";
const urlFahrzeuge = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Fahrzeuge";

let produkte = [];
let mapping = [];
let fahrzeuge = [];

Promise.all([
    fetch(urlProdukte).then(r => r.json()),
    fetch(urlMapping).then(r => r.json()),
    fetch(urlFahrzeuge).then(r => r.json())
])
.then(([p, m, f]) => {
    produkte = p;
    mapping = m;
    fahrzeuge = f;
    init();
});

function clean(v) {
    return (v || "").toString().trim();
}

function init() {
    let reihen = [...new Set(mapping.map(x => clean(x["Reihe"])).filter(x => x))];

    let el = document.getElementById("reihe");
    el.innerHTML = "<option value=''>Reihe wählen</option>";

    reihen.forEach(r => el.add(new Option(r, r)));
}


// 👉 REIHE → MODELL
document.getElementById("reihe").addEventListener("change", function() {

    let modelle = [...new Set(
        mapping
            .filter(x => clean(x["Reihe"]) === this.value)
            .map(x => clean(x["Modell"]))
    )];

    let el = document.getElementById("modell");
    el.innerHTML = "<option value=''>Modell wählen</option>";

    modelle.forEach(m => el.add(new Option(m, m)));
});


// 👉 MODELL → GENERATION
document.getElementById("modell").addEventListener("change", function() {

    let reihe = document.getElementById("reihe").value;

    let gens = [...new Set(
        mapping.filter(x =>
            clean(x["Reihe"]) === reihe &&
            clean(x["Modell"]) === this.value
        ).map(x => clean(x["Generation"]))
    )];

    let el = document.getElementById("generation");
    el.innerHTML = "<option value=''>Generation wählen</option>";

    gens.forEach(g => el.add(new Option(g, g)));
});


// 👉 GENERATION → MOTOR + BILD
document.getElementById("generation").addEventListener("change", function() {

    let reihe = document.getElementById("reihe").value;
    let modell = document.getElementById("modell").value;

    let motors = [...new Set(
        mapping.filter(x =>
            clean(x["Reihe"]) === reihe &&
            clean(x["Modell"]) === modell &&
            clean(x["Generation"]) === this.value
        ).map(x => clean(x["Motor"]))
    )];

    let el = document.getElementById("motor");
    el.innerHTML = "<option value=''>Motor wählen</option>";

    motors.forEach(m => el.add(new Option(m, m)));

    // 👉 Fahrzeugbild
    let fahrzeug = fahrzeuge.find(f =>
        clean(f["Reihe"]) === reihe &&
        clean(f["Modell"]) === modell &&
        clean(f["Generation"]) === this.value
    );

    if (fahrzeug && fahrzeug["Bild"]) {
        document.getElementById("fahrzeugBild").innerHTML =
            `<img src="${fahrzeug["Bild"]}" style="max-width:300px;" onerror="this.style.display='none'">`;
    } else {
        document.getElementById("fahrzeugBild").innerHTML = "";
    }
});


// 👉 MOTOR → RESULTATE
document.getElementById("motor").addEventListener("change", function() {

    let reihe = document.getElementById("reihe").value;
    let modell = document.getElementById("modell").value;
    let gen = document.getElementById("generation").value;
    let motor = this.value;

    let tnList = mapping
        .filter(x =>
            clean(x["Reihe"]) === reihe &&
            clean(x["Modell"]) === modell &&
            clean(x["Generation"]) === gen &&
            clean(x["Motor"]) === motor
        )
        .map(x => clean(x["TN"]));

    let results = produkte.filter(p => tnList.includes(clean(p["TN"])));

    render(results);
});


function render(results) {

    let html = "";

    results.forEach(r => {

        let lager = parseInt(r["Lager"]) || 0;

        let lagerText =
            lager > 3 ? "🟢 Lager verfügbar" :
            lager > 0 ? "🟠 Wenig Lager" :
            "🔴 Nicht verfügbar";

        html += `
        <div style="border:1px solid #ddd; padding:15px; margin:10px; border-radius:10px;">

            ${r["Bild"] ? `<img src="${r["Bild"]}" style="width:200px;" onerror="this.style.display='none'">` : ""}

            <h3>${r["Bezeichnung"] || "-"}</h3>

            <p><strong>${r["Dimension"] || ""}</strong></p>

            <p>${r["Reifen"] || ""}</p>

            ${r["Hinweistext"] ? `<p style="color:red; font-size:12px;">${r["Hinweistext"]}</p>` : ""}

            <p>${lagerText}</p>

            <strong>${r["Preis"] || "-"} CHF</strong>

        </div>`;
    });

    document.getElementById("results").innerHTML = html;
}

</script>

</body>
