<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WKR Konfigurator</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
}

/* CONTAINER */
.container {
    max-width: 1400px;
    margin: auto;
    background: white;
    padding: 40px;
    border-radius: 12px;
}

/* HEADER */
.logo {
    text-align: center;
    margin-bottom: 30px;
}
.logo img { max-width: 500px; }

h2 { text-align:center; }

/* AUSWAHL BOX */
.summary-box {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f3f3f3;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 40px;
}

/* GRID */
.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

/* CARD */
.card {
    border: 1px solid #ccc;
    padding: 15px;
    cursor: pointer;
    border-radius: 10px;
    text-align: center;
    width: 180px;
}

.card:hover {
    border-color: #1c69d4;
    transform: scale(1.03);
}

.card img {
    max-width: 140px;
}

/* PRODUKT LISTE */
.product {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #ddd;
    padding: 25px 0;
}

/* LINKS */
.product-left {
    display: flex;
    gap: 20px;
}

.product-left img {
    width: 220px;
}

/* PREIS */
.old-price {
    text-decoration: line-through;
    color: #999;
}

.new-price {
    font-size: 22px;
    font-weight: bold;
}

/* STATUS */
.green { color: green; }
.orange { color: orange; }
.red { color: red; }

/* BUTTON */
.button {
    background: #1c69d4;
    color: white;
    padding: 10px 15px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    margin-top: 10px;
}

/* FORM */
.form-box {
    margin-top: 40px;
    padding: 20px;
    background: #f3f3f3;
    border-radius: 10px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="https://raw.githubusercontent.com/michelcarricamarta-ui/emmenegger-wkr/main/BMW_MINI_Emmenegger_rechtsbuendig_claim_rgb_pos.png">
<h2>Winterkompletträder Konfigurator</h2>
</div>

<div id="app"></div>

</div>

<script>

const urlProdukte = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Produkte";
const urlMapping = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Zuordnung";
const urlFahrzeuge = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Fahrzeuge";

let produkte=[], mapping=[], fahrzeuge=[];

let state = { reihe:null, modell:null, motor:null, produkt:null };

function clean(v){ return (v||"").toString().trim(); }

Promise.all([
fetch(urlProdukte).then(r=>r.json()),
fetch(urlMapping).then(r=>r.json()),
fetch(urlFahrzeuge).then(r=>r.json())
]).then(([p,m,f])=>{
produkte=p;
mapping=m;
fahrzeuge=f;
render();
});

function render(){

let html="";

/* AUSWAHL BOX */
if(state.motor){
html += `
<div class="summary-box">
<div>
<b>Ihre Auswahl:</b><br>
${state.reihe} / ${state.modell} / ${state.motor}<br><br>
<button class="button" onclick="resetSelection()">Zurück</button>
</div>
</div>
`;
}

/* REIHE */
if(!state.reihe){
let reihen=[...new Set(mapping.map(x=>clean(x["Reihe"])))];

html+=`<b>1. Reihe wählen</b><div class="grid">`;

reihen.forEach(r=>{
html+=`<div class="card" onclick="selectReihe('${r}')">${r}</div>`;
});

html+=`</div>`;
}

/* MODELL */
if(state.reihe && !state.modell){
let modelle=[...new Set(mapping
.filter(x=>clean(x["Reihe"])===state.reihe)
.map(x=>clean(x["Modell"]))
)];

html+=`<br><b>2. Modell wählen</b><div class="grid">`;

modelle.forEach(m=>{
html+=`<div class="card" onclick="selectModell('${m}')">${m}</div>`;
});

html+=`</div>`;
}

/* MOTOR */
if(state.modell && !state.motor){
let motors=[...new Set(mapping
.filter(x=>
clean(x["Reihe"])===state.reihe &&
clean(x["Modell"])===state.modell
)
.map(x=>clean(x["Motor"]))
)];

html+=`<br><b>3. Motor wählen</b><div class="grid">`;

motors.forEach(m=>{
html+=`<div class="card" onclick="selectMotor('${m}')">${m}</div>`;
});

html+=`</div>`;
}

/* PRODUKTE */
if(state.motor && !state.produkt){

let tnList=mapping.filter(x=>
clean(x["Reihe"])===state.reihe &&
clean(x["Modell"])===state.modell &&
clean(x["Motor"])===state.motor
).map(x=>clean(x["TN"]));

let results=produkte.filter(p=>tnList.includes(clean(p["TN"])));

results.forEach(r=>{

let lager=parseInt(r["Lager"])||0;
let status=lager>3?"green":lager>0?"orange":"red";
let text=lager>3?"Sofort verfügbar":lager>0?"Wenig Lager":"Nicht verfügbar";

html+=`
<div class="product">

<div class="product-left">
<img src="${clean(r["Bild"])}">
<div>
<b>${r["Bezeichnung"]}</b><br>
${r["Reifen"]}<br>
${r["Dimension"]}
</div>
</div>

<div>
<div class="new-price">${r["Angebotspreis"]} CHF</div>
<div class="${status}">${text}</div>
<button class="button" onclick='selectProdukt(${JSON.stringify(r)})'>Auswählen</button>
</div>

</div>`;
});
}

/* FORMULAR */
if(state.produkt){

html+=`
<div class="form-box">

<h3>Ihre Anfrage</h3>

<b>${state.produkt["Bezeichnung"]}</b><br>
${state.produkt["Angebotspreis"]} CHF<br><br>

<input id="name" placeholder="Name">
<input id="email" placeholder="E-Mail">
<textarea id="bemerkung" placeholder="Bemerkung"></textarea>

<button class="button" onclick="sendMail()">Anfrage senden</button>

</div>
`;
}

document.getElementById("app").innerHTML=html;
}

/* ACTIONS */
function selectReihe(r){
state.reihe=r;
state.modell=null;
state.motor=null;
state.produkt=null;
render();
}

function selectModell(m){
state.modell=m;
state.motor=null;
state.produkt=null;
render();
}

function selectMotor(m){
state.motor=m;
state.produkt=null;
render();
}

function selectProdukt(p){
state.produkt=p;
render();
}

function resetSelection(){
state = { reihe:null, modell:null, motor:null, produkt:null };
render();
}

/* MAIL */
function sendMail(){

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let bemerkung = document.getElementById("bemerkung").value;

let text = `
Name: ${name}
Email: ${email}

Produkt: ${state.produkt["Bezeichnung"]}
Preis: ${state.produkt["Angebotspreis"]} CHF

Bemerkung:
${bemerkung}
`;

window.location.href = "mailto:tv-g-fp@emmeneggerag.ch?subject=WKR Anfrage&body=" + encodeURIComponent(text);
}

</script>

</body>
</html>
