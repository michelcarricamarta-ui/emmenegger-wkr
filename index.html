<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WKR Konfigurator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
}

.container {
    max-width: 1100px;
    margin: 60px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 30px;
}

.select-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 25px;
}

select {
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    min-width: 140px;
}

/* Layout */
.layout {
    display: flex;
    gap: 20px;
}

.left {
    flex: 2;
}

.right {
    flex: 1;
    text-align: center;
}

.right img {
    max-width: 100%;
    border-radius: 10px;
}

/* Liste */
.list-card {
    display: flex;
    gap: 15px;
    border: 1px solid #eee;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
    background: #fafafa;
    align-items: center;
}

.list-card img {
    width: 120px;
    border-radius: 6px;
}

.list-info {
    flex: 1;
}

.price {
    font-weight: bold;
}

.hinweis {
    color: red;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">

<h2>Winterräder Konfigurator</h2>

<div class="select-row">
    <select id="reihe"></select>
    <select id="modell"></select>
    <select id="generation"></select>
    <select id="motor"></select>
</div>

<div id="mainContent"></div>

</div>

<script>

const urlProdukte = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Produkte";
const urlMapping = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Zuordnung";
const urlFahrzeuge = "https://opensheet.elk.sh/1LpvDu3OTGyfPsR-Fmd2Qn6EhvXzNZUqcyJ2EFngeiwU/Fahrzeuge";

let produkte = [];
let mapping = [];
let fahrzeuge = [];

function clean(v) {
    return (v || "").toString().trim();
}

function getImageUrl(url) {
    if (!url) return "https://via.placeholder.com/300?text=Kein+Bild";
    return url.trim();
}

Promise.all([
    fetch(urlProdukte).then(r => r.json()),
    fetch(urlMapping).then(r => r.json()),
    fetch(urlFahrzeuge).then(r => r.json())
])
.then(([p, m, f]) => {
    produkte = p;
    mapping = m;
    fahrzeuge = f;
    init();
});

function init() {
    let reihen = [...new Set(mapping.map(x => clean(x["Reihe"])).filter(x => x))];

    let el = document.getElementById("reihe");
    el.innerHTML = "<option value=''>Reihe wählen</option>";

    reihen.forEach(r => el.add(new Option(r, r)));
}

/* REIHE → MODELL */
document.getElementById("reihe").addEventListener("change", function() {

    let modelle = [...new Set(
        mapping.filter(x => clean(x["Reihe"]) === this.value)
               .map(x => clean(x["Modell"]))
    )];

    let el = document.getElementById("modell");
    el.innerHTML = "<option value=''>Modell wählen</option>";

    modelle.forEach(m => el.add(new Option(m, m)));
});

/* MODELL → GENERATION */
document.getElementById("modell").addEventListener("change", function() {

    let reihe = document.getElementById("reihe").value;

    let gens = [...new Set(
        mapping.filter(x =>
            clean(x["Reihe"]) === reihe &&
            clean(x["Modell"]) === this.value
        ).map(x => clean(x["Generation"]))
    )];

    let el = document.getElementById("generation");
    el.innerHTML = "<option value=''>Generation wählen</option>";

    gens.forEach(g => el.add(new Option(g, g)));
});

/* GENERATION → MOTOR + grosses Bild */
document.getElementById("generation").addEventListener("change", function() {

    let reihe = document.getElementById("reihe").value;
    let modell = document.getElementById("modell").value;

    let motors = [...new Set(
        mapping.filter(x =>
            clean(x["Reihe"]) === reihe &&
            clean(x["Modell"]) === modell &&
            clean(x["Generation"]) === this.value
        ).map(x => clean(x["Motor"]))
    )];

    let el = document.getElementById("motor");
    el.innerHTML = "<option value=''>Motor wählen</option>";

    motors.forEach(m => el.add(new Option(m, m)));

    let fahrzeug = fahrzeuge.find(f =>
        clean(f["Reihe"]) === reihe &&
        clean(f["Modell"]) === modell &&
        clean(f["Generation"]) === this.value
    );

    document.getElementById("mainContent").innerHTML =
        fahrzeug && fahrzeug["Bild"]
        ? `<div style="text-align:center;">
             <img src="${getImageUrl(fahrzeug["Bild"])}" style="max-width:400px;">
           </div>`
        : "";
});

/* MOTOR → LISTE + RECHTS BILD */
document.getElementById("motor").addEventListener("change", function() {

    let reihe = document.getElementById("reihe").value;
    let modell = document.getElementById("modell").value;
    let gen = document.getElementById("generation").value;
    let motor = this.value;

    let tnList = mapping
        .filter(x =>
            clean(x["Reihe"]) === reihe &&
            clean(x["Modell"]) === modell &&
            clean(x["Generation"]) === gen &&
            clean(x["Motor"]) === motor
        )
        .map(x => clean(x["TN"]));

    let results = produkte.filter(p => tnList.includes(clean(p["TN"])));

    render(results);
});

/* RENDER */
function render(results) {

    let fahrzeugBild = document.querySelector("#mainContent img")?.src || "";

    let html = `<div class="layout"><div class="left">`;

    results.forEach(r => {

        let lager = parseInt(r["Lager"]) || 0;

        let lagerText =
            lager > 3 ? "🟢 Lager verfügbar" :
            lager > 0 ? "🟠 Wenig Lager" :
            "🔴 Nicht verfügbar";

        html += `
        <div class="list-card">

            <img src="${getImageUrl(r["Bild"])}"
                 onerror="this.src='https://via.placeholder.com/120'">

            <div class="list-info">
                <strong>${r["Bezeichnung"] || "-"}</strong><br>
                ${r["Dimension"] || ""}<br>
                ${r["Reifen"] || ""}<br>
                ${lagerText}<br>
                <span class="price">${r["Preis"] || "-"} CHF</span>
            </div>

        </div>`;
    });

    html += `</div><div class="right">`;

    if (fahrzeugBild) {
        html += `<img src="${fahrzeugBild}">`;
    }

    html += `</div></div>`;

    document.getElementById("mainContent").innerHTML = html;
}

</script>

</body>
</html>
