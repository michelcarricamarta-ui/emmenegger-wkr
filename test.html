<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WKR Konfigurator | Emmenegger</title>

    <style>
        :root {
            --primary-color: #1c69d4;
            --primary-hover: #1557b0;
            --bg-color: #f5f5f5;
            --text-dark: #1f1f1f;
            --border-color: #d6dbe3;
            --mini-color: #111;
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg-color);
            margin: 0;
            color: var(--text-dark);
        }

        .container {
            max-width: 1500px;
            margin: 18px auto;
            background: white;
            padding: 95px 40px 55px 40px;
            border-radius: 16px;
            position: relative;
            box-sizing: border-box;
            min-height: 90vh;
        }

        /* Header & Navigation */
        .logo-top {
            position: absolute;
            top: 20px;
            right: 30px;
            z-index: 5;
        }
        .logo-top img {
            width: 260px;
            max-width: 100%;
        }
        .nav-wrap {
            position: absolute;
            top: 58px;
            left: 30px;
            display: flex;
            gap: 20px;
            z-index: 6;
        }
        .internal-login-wrap {
            position: absolute;
            top: 58px;
            right: 30px;
            z-index: 6;
        }

        .btn-link {
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 700;
            color: var(--primary-color);
            cursor: pointer;
            padding: 0;
        }
        .btn-link:hover { text-decoration: underline; }

        .internal-login-btn {
            background: rgba(255,255,255,0.92);
            border: 1px solid #c7c7c7;
            color: #555;
            font-size: 12px;
            padding: 7px 12px;
            border-radius: 7px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Hero Bereich */
        .hero {
            position: relative;
            height: 320px;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 35px;
            background: url('https://github.com/michelcarricamarta-ui/emmenegger-wkr/blob/main/WINTER%20Ix3.jpg?raw=true') center/cover;
        }
        .hero::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.45), rgba(0,0,0,0.1));
        }
        .hero-text {
            position: absolute;
            left: 40px;
            bottom: 35px;
            z-index: 2;
            color: white;
        }

        /* Status Banner */
        .internal-banner {
            background: #c62828;
            color: white;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-weight: 700;
            text-align: center;
            display: none;
        }

        /* Grid & Cards */
        .selection-label {
            font-size: 24px;
            font-weight: 700;
            margin: 35px 0;
            text-align: center;
        }
        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: center;
        }
        .card {
            border: 1px solid var(--border-color);
            padding: 22px;
            cursor: pointer;
            border-radius: 14px;
            background: white;
            text-align: center;
            min-width: 230px;
            transition: all 0.2s ease;
            border-top: 4px solid var(--primary-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 26px rgba(28,105,212,0.15);
        }

        /* Produktliste */
        .product {
            display: flex;
            justify-content: space-between;
            gap: 30px;
            border-bottom: 1px solid #d8d8d8;
            padding: 28px 0;
        }
        .product img { width: 210px; height: 170px; object-fit: contain; cursor: zoom-in; }
        .product-info { flex: 1; }
        .price-value { font-size: 22px; font-weight: 700; color: var(--text-dark); }
        
        /* Modals */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 550px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal input, .modal select, .modal textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .button {
            background: var(--primary-color);
            color: white;
            padding: 12px 24px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: background 0.2s;
        }
        .button:hover { background: var(--primary-hover); }
        .button-secondary { background: #777; }

        /* Responsive */
        @media (max-width: 760px) {
            .container { padding-top: 120px; }
            .product { flex-direction: column; }
            .hero { height: 200px; }
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="logo-top">
        <img src="https://raw.githubusercontent.com/michelcarricamarta-ui/emmenegger-wkr/main/BMW_MINI_Emmenegger_rechtsbuendig_claim_rgb_pos.png" alt="Logo">
    </div>

    <div class="nav-wrap">
        <button class="btn-link" onclick="location.reload()">← Neustart</button>
    </div>

    <div class="internal-login-wrap" id="loginArea">
        <button class="internal-login-btn" onclick="toggleModal('loginModal', true)">Interner Login</button>
    </div>

    <div id="internalBanner" class="internal-banner">INTERNER BESTELLMODUS AKTIV</div>

    <div class="hero">
        <div class="hero-text">
            <h1>Original Winterkompletträder</h1>
            <p>Sicherheit und Stil für die kalte Jahreszeit.</p>
        </div>
    </div>

    <div id="app">
        <div class="selection-label">Wählen Sie Ihren Standort</div>
        <div class="grid">
            <div class="card" onclick="selectStep('standort', 'GEB')"><h3>Gebenstorf</h3></div>
            <div class="card" onclick="selectStep('standort', 'HET')"><h3>Hettenschwil</h3></div>
        </div>
    </div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content" style="max-width: 350px;">
        <h3>Interner Login</h3>
        <input type="text" id="loginName" placeholder="Name (z.B. M.Muster)">
        <input type="password" id="loginPassword" placeholder="Passwort">
        <button class="button" style="width:100%" onclick="handleLogin()">Login</button>
        <button class="btn-link" style="margin-top:10px; width:100%" onclick="toggleModal('loginModal', false)">Abbrechen</button>
    </div>
</div>

<div id="requestModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Anfrage senden</h3>
        <p id="modalProductSummary" style="font-weight:700; color:var(--primary-color);"></p>
        
        <div id="publicFields">
            <label>Ihr Name *</label>
            <input type="text" id="formName" placeholder="Vor- und Nachname">
            <label>E-Mail *</label>
            <input type="email" id="formEmail" placeholder="beispiel@mail.ch">
            <label>Kontrollschild *</label>
            <input type="text" id="formPlate" placeholder="z.B. AG 123456">
        </div>

        <div id="internalFields" style="display:none;">
            <label>Verkäufer (angemeldet)</label>
            <input type="text" id="formSeller" readonly>
            <label>Kundenname *</label>
            <input type="text" id="formCustomer" placeholder="Name des Kunden">
            <label>Adressnummer Rechnungsempfänger *</label>
            <input type="text" id="formAddr" placeholder="z.B. 100234">
            <label>Ordernummer *</label>
            <input type="text" id="formOrder" placeholder="z.B. 887766">
        </div>

        <label>Anliegen *</label>
        <select id="formType">
            <option value="Anfrage">Unverbindliche Anfrage</option>
            <option value="Bestellung">Verbindliche Bestellung</option>
        </select>

        <label>Bemerkung</label>
        <textarea id="formNote" placeholder="Zusätzliche Infos..."></textarea>

        <div style="display:flex; gap:10px;">
            <button class="button" id="sendBtn" onclick="handleSubmission()">Senden</button>
            <button class="button button-secondary" onclick="generatePDF()">PDF Offerte</button>
            <button class="button button-secondary" onclick="toggleModal('requestModal', false)">Schliessen</button>
        </div>
    </div>
</div>

<script>
    // --- STATE & DATEN ---
    let isInternal = false;
    let selectedProduct = null;
    const configState = { standort: null, marke: null, reihe: null, modell: null };

    // Beispiel Datenstruktur (Normalerweise von API/Datenbank)
    const mockData = [
        { id: 1, marke: "BMW", reihe: "3er", modell: "G20/G21", bezeichnung: "V-Speiche 780", markeReifen: "Pirelli", dimension: "225/50 R18", preis: 2450, bild: "https://via.placeholder.com/200", mail: "verkauf@emmenegger.ch" }
    ];

    // --- NAVIGATION & LOGIK ---
    function selectStep(key, value) {
        configState[key] = value;
        renderApp();
    }

    function renderApp() {
        const app = document.getElementById("app");
        // Hier würde die Logik folgen, um basierend auf configState die nächsten Karten zu zeigen.
        // Zur Demo zeigen wir direkt ein Produkt, wenn der Standort gewählt wurde.
        if(configState.standort) {
            showProducts();
        }
    }

    function showProducts() {
        const app = document.getElementById("app");
        app.innerHTML = `
            <div class="selection-label">Verfügbare Winterkompletträder</div>
            <div class="product">
                <img src="${mockData[0].bild}" alt="Rad">
                <div class="product-info">
                    <div class="price-value">${mockData[0].preis} CHF</div>
                    <h3>${mockData[0].bezeichnung}</h3>
                    <p>${mockData[0].markeReifen} | ${mockData[0].dimension}</p>
                </div>
                <button class="button" onclick="openRequest(${mockData[0].id})">Auswählen</button>
            </div>
        `;
    }

    // --- MODAL CONTROLS ---
    function toggleModal(id, show) {
        document.getElementById(id).style.display = show ? 'flex' : 'none';
    }

    function handleLogin() {
        const pw = document.getElementById("loginPassword").value;
        const name = document.getElementById("loginName").value;
        if(pw === "28010" && name.trim() !== "") {
            isInternal = true;
            document.getElementById("internalBanner").style.display = "block";
            document.getElementById("loginArea").style.display = "none";
            document.getElementById("formSeller").value = name;
            toggleModal('loginModal', false);
            alert("Erfolgreich als " + name + " angemeldet.");
        } else {
            alert("Login fehlgeschlagen.");
        }
    }

    function openRequest(productId) {
        selectedProduct = mockData.find(p => p.id === productId);
        document.getElementById("modalProductSummary").innerText = selectedProduct.bezeichnung + " (" + selectedProduct.preis + " CHF)";
        
        if(isInternal) {
            document.getElementById("internalFields").style.display = "block";
            document.getElementById("publicFields").style.display = "none";
        }
        toggleModal('requestModal', true);
    }

    // --- PDF GENERIERUNG ---
    function generatePDF() {
        const win = window.open("", "_blank");
        const content = `
            <html><body style="font-family:sans-serif; padding:50px;">
                <h1>Offerte: ${selectedProduct.bezeichnung}</h1>
                <hr>
                <p>Preis: ${selectedProduct.preis} CHF</p>
                <p>Dimension: ${selectedProduct.dimension}</p>
                <p>Erstellt am: ${new Date().toLocaleDateString()}</p>
                <button onclick="window.print()">Drucken / PDF Speichern</button>
            </body></html>
        `;
        win.document.write(content);
        win.document.close();
    }

    // --- FORMULAR VERSAND ---
    async function handleSubmission() {
        const btn = document.getElementById("sendBtn");
        btn.innerText = "Sende...";
        btn.disabled = true;

        // Hier Web3Forms Logik einbauen (wie in deinem Original)
        setTimeout(() => {
            alert("Vielen Dank! Ihre Anfrage wurde erfolgreich übermittelt.");
            toggleModal('requestModal', false);
            btn.innerText = "Senden";
            btn.disabled = false;
        }, 1500);
    }
</script>

</body>
</html>
